# ─────────────────────────────────────────────
# netlify.toml — Deploy configuration
# Anthony | Unleashing Genius
# ─────────────────────────────────────────────

[build]
  publish = "."

# ── Redirect rules ──

# Clean URLs: /about → /about.html
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/coaching"
  to   = "/coaching.html"
  status = 200

[[redirects]]
  from = "/youth"
  to   = "/youth.html"
  status = 200

[[redirects]]
  from = "/reentry"
  to   = "/reentry.html"
  status = 200

[[redirects]]
  from = "/speaking"
  to   = "/speaking.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to   = "/thank-you.html"
  status = 200

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── Headers ──

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
