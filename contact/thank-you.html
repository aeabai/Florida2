<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Anthony · Unleashing Genius</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    .thankyou-page {
      min-height: 100vh;
      background: var(--charcoal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .thankyou-check {
      font-size: 64px;
      margin-bottom: 32px;
      display: block;
    }
    .thankyou-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 16px;
      display: block;
    }
    .thankyou-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 900;
      color: var(--offwhite);
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .thankyou-heading em {
      color: var(--copper);
      font-style: italic;
    }
    .thankyou-body {
      font-size: 17px;
      line-height: 1.75;
      color: var(--light);
      max-width: 480px;
      margin-bottom: 48px;
    }
    .thankyou-signoff {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--copper);
      font-style: italic;
      margin-top: 48px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/">Anthony <span>·</span> Unleashing Genius</a>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="/#about">About</a></li>
      <li><a href="/#tracks">The Work</a></li>
      <li><a href="/#speaking">Speaking</a></li>
      <li><a href="/#contact">Connect</a></li>
    </ul>
  </nav>

  <div class="thankyou-page">
    <span class="thankyou-check" aria-hidden="true">✓</span>
    <span class="thankyou-label">Message Received</span>
    <h1 class="thankyou-heading">
      Your message is<br><em>on its way.</em>
    </h1>
    <p class="thankyou-body">
      Anthony reads every message himself and responds personally.
      You'll hear back soon — usually within 24 hours.
    </p>
    <a href="/" class="btn btn-outline">Back to Home</a>
    <p class="thankyou-signoff">You Matter To Me.</p>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
